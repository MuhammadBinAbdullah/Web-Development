<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Create A Slider</title>

     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css">
     <style>
        body{
            background-color: orange;
        }
     </style>
  <div class="container">
    <h2>Carousel Example</h2>
    <div id="myCarousel" class="carousel slide" data-ride="carousel">

      <ol class="carousel-indicators">
        <li data-target="#myCarousel" data-slide-to="0" class="active"></li>
        <li data-target="#myCarousel" data-slide-to="1"></li>
        <li data-target="#myCarousel" data-slide-to="2"></li>
      </ol>

      <div class="carousel-inner">
        <div class="item active">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSY54XejMxxGbyRk5PZFo5Q9rrv11K2uEKqJzx3LVTyCQ&s=10" alt="Los Angeles" style="width:70%;">
        </div>
        <div class="item">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgTk62jHE-3fu_a7EhyKJ3p-wbEsj2RtbQckG2Y8I02Q&s=10" alt="Chicago" style="width:70%;">
        </div>
      </div>
    </div>
  </div>
  <div class="item">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgTk62jHE-3fu_a7EhyKJ3p-wbEsj2RtbQckG2Y8I02Q&s=10" alt="Chicago" style="width:70%;">
        </div>
</div>

<div class="item">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSY54XejMxxGbyRk5PZFo5Q9rrv11K2uEKqJzx3LVTyCQ&s=10" alt="Los Angeles" alt="New York" style="width: 70% ;">
</div>


<a class="left carousel-control" href="#myCarousel" data-slide="prev">
  <span class="glyphicon glyphicon-chevron-left"></span>
  <span class="sr-only">Previous</span>
</a>
<a class="right carousel-control" href="#myCarousel" data-slide="next">
  <span class="glyphicon glyphicon-chevron-right"></span>
  <span class="sr-only">Next</span>
</a>

  
</body>
</html>
