<!doctype html>
<html lang="en">
 <head><script src="/_sdk/telemetry_sdk.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Target Shooter 3D</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #07111f;
      --midnight: #0a1a2e;
      --panel: #10243c;
      --cream: #f8edcf;
      --gold: #ffc857;
      --orange: #ff8c42;
      --red: #f05d5e;
      --mint: #56e39f;
      --blue: #48bfe3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      color: var(--cream);
      overflow-x: hidden;
    }

    .page-shell {
      width: 100%;
      min-height: calc(100 * min(var(--vh, 1vh), 1vh));
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(72,191,227,.12), transparent 26%),
        radial-gradient(circle at 86% 12%, rgba(255,200,87,.12), transparent 22%),
        linear-gradient(180deg, #08111d 0%, #0b1b2e 54%, #07111f 100%);
    }

    .page-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.28) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,.18) 1px, transparent 1px);
      background-size: 90px 90px, 130px 130px;
      background-position: 0 0, 35px 25px;
      opacity: .18;
    }

    .top-glow {
      position: absolute;
      top: -140px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 250px;
      background: radial-gradient(circle, rgba(255,200,87,.24), transparent 70%);
      filter: blur(12px);
      pointer-events: none;
    }

    .game-frame {
      position: relative;
      z-index: 2;
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 24px 26px;
    }

    .eyebrow {
      letter-spacing: .18em;
      text-transform: uppercase;
      font-size: 12px;
    }

    .hero-title {
      line-height: .95;
      letter-spacing: -0.05em;
      text-shadow: 0 4px 0 rgba(0,0,0,.22);
    }

    .dashboard-card {
      background: linear-gradient(180deg, rgba(17,40,66,.96), rgba(12,28,47,.96));
      border: 1px solid rgba(255,255,255,.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 16px 40px rgba(0,0,0,.2),
        0 6px 0 rgba(0,0,0,.12);
      transform: perspective(900px) rotateX(2deg);
    }

    .metric-value {
      font-family: 'Space Mono', monospace;
      line-height: 1;
    }

    .range-wrap {
      position: relative;
      border: 2px solid rgba(255,200,87,.55);
      box-shadow:
        0 0 0 8px rgba(255,200,87,.06),
        0 22px 60px rgba(0,0,0,.36),
        inset 0 0 40px rgba(72,191,227,.08);
      background:
        radial-gradient(circle at center, rgba(72,191,227,.12), rgba(8,19,32,.2) 45%, rgba(5,11,20,.78) 100%);
    }

    .range-sign {
      background: repeating-linear-gradient(
        90deg,
        rgba(255,200,87,.95) 0 18px,
        rgba(241,163,64,.95) 18px 36px
      );
      color: #2c1805;
      box-shadow:
        inset 0 -4px 0 rgba(0,0,0,.1),
        0 6px 18px rgba(0,0,0,.25);
    }

    .playfield {
      height: 470px;
      position: relative;
      overflow: hidden;
      cursor: crosshair;
      isolation: isolate;
      perspective: 900px;
      background:
        radial-gradient(circle at 50% 34%, rgba(72,191,227,.18), transparent 28%),
        linear-gradient(180deg, rgba(8,18,31,.94), rgba(7,16,27,.98));
    }

    .range-room {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      overflow: hidden;
    }

    .back-wall {
      position: absolute;
      left: 22%;
      right: 22%;
      top: 17%;
      bottom: 25%;
      border: 1px solid rgba(72,191,227,.18);
      background:
        radial-gradient(circle at center, rgba(72,191,227,.12), transparent 60%),
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(8,28,43,.78), rgba(6,17,29,.82));
      background-size: 100% 100%, 28px 28px, 28px 28px, 100% 100%;
      box-shadow:
        inset 0 0 30px rgba(72,191,227,.1),
        0 0 40px rgba(72,191,227,.08);
      z-index: 0;
    }

    .back-wall::before,
    .back-wall::after {
      content: "";
      position: absolute;
      top: 12%;
      width: 7px;
      height: 76%;
      border-radius: 20px;
      background: linear-gradient(180deg, transparent, rgba(255,200,87,.7), transparent);
      filter: blur(.3px);
      opacity: .65;
    }

    .back-wall::before { left: 9%; }
    .back-wall::after { right: 9%; }

    .floor-plane {
      position: absolute;
      left: -8%;
      right: -8%;
      bottom: -6%;
      height: 44%;
      transform-origin: bottom center;
      transform: rotateX(66deg);
      background:
        linear-gradient(rgba(255,255,255,.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(180deg, rgba(22,55,84,.9), rgba(7,17,29,.96));
      background-size: 52px 24px, 52px 24px, 100% 100%;
      box-shadow: inset 0 18px 30px rgba(72,191,227,.06);
      z-index: 1;
    }

    .floor-plane::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(100deg, transparent 49%, rgba(255,255,255,.06) 50%, transparent 51%) 0 0 / 170px 100%,
        linear-gradient(80deg, transparent 49%, rgba(255,255,255,.06) 50%, transparent 51%) 0 0 / 170px 100%;
      opacity: .45;
    }

    .left-wall,
    .right-wall {
      position: absolute;
      top: 0;
      bottom: 18%;
      width: 28%;
      background:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(14,31,51,.84), rgba(8,18,30,.9));
      background-size: 100% 34px, 100% 100%;
      opacity: .9;
      z-index: 1;
    }

    .left-wall {
      left: -4%;
      transform-origin: left center;
      transform: skewY(13deg);
      clip-path: polygon(0 0, 100% 17%, 100% 82%, 0 100%);
      border-right: 1px solid rgba(72,191,227,.12);
    }

    .right-wall {
      right: -4%;
      transform-origin: right center;
      transform: skewY(-13deg);
      clip-path: polygon(0 17%, 100% 0, 100% 100%, 0 82%);
      border-left: 1px solid rgba(72,191,227,.12);
    }

    .ceiling-lines {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .ceiling-lines::before,
    .ceiling-lines::after {
      content: "";
      position: absolute;
      top: 0;
      height: 20%;
      width: 42%;
      border-top: 1px solid rgba(255,255,255,.08);
      opacity: .5;
    }

    .ceiling-lines::before {
      left: 0;
      border-right: 1px solid rgba(255,255,255,.06);
      transform: skewY(-14deg);
      transform-origin: top right;
    }

    .ceiling-lines::after {
      right: 0;
      border-left: 1px solid rgba(255,255,255,.06);
      transform: skewY(14deg);
      transform-origin: top left;
    }

    .depth-line {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 1px;
      height: 70%;
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.12));
      transform-origin: bottom center;
      z-index: 1;
      opacity: .5;
    }

    .depth-line.one { transform: rotate(28deg); }
    .depth-line.two { transform: rotate(-28deg); }
    .depth-line.three { transform: rotate(14deg); opacity: .32; }
    .depth-line.four { transform: rotate(-14deg); opacity: .32; }

    .target {
      position: absolute;
      width: 74px;
      height: 74px;
      border: 0;
      border-radius: 999px;
      background:
        radial-gradient(circle, #fff6d8 0 11%, #f05d5e 12% 25%, #fff6d8 26% 39%, #f05d5e 40% 56%, #fff6d8 57% 72%, #f05d5e 73% 100%);
      box-shadow:
        0 0 0 5px rgba(255,255,255,.13),
        0 8px 0 #7f2e2f,
        0 18px 24px rgba(0,0,0,.38),
        0 0 24px rgba(240,93,94,.28);
      transform-origin: center center;
      transition: filter .15s ease, scale .15s ease;
      z-index: 4;
      transform-style: preserve-3d;
    }

    .target::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.18);
      box-shadow: inset 0 0 12px rgba(0,0,0,.18);
    }

    .target::after {
      content: "";
      position: absolute;
      inset: 21px;
      border-radius: 50%;
      background: #f05d5e;
      box-shadow: inset 0 0 0 7px #fff6d8;
    }

    .target:hover,
    .target:focus-visible {
      filter: brightness(1.12);
      outline: 3px solid rgba(86,227,159,.75);
      outline-offset: 4px;
    }

    .target.hit {
      animation: targetPop .22s ease-out forwards;
    }

    @keyframes targetPop {
      0% { filter: brightness(1); }
      60% { filter: brightness(1.55); }
      100% { filter: brightness(1); opacity: .2; }
    }

    .target-shadow {
      position: absolute;
      width: 72px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(0,0,0,.36), transparent 70%);
      filter: blur(3px);
      z-index: 2;
      pointer-events: none;
    }

    .float-score {
      position: absolute;
      z-index: 8;
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--mint);
      pointer-events: none;
      text-shadow: 0 2px 0 rgba(0,0,0,.25);
      animation: floatScore .72s ease-out forwards;
    }

    @keyframes floatScore {
      0% { opacity: 0; transform: translateY(8px) scale(.9); }
      20% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-28px) scale(1.05); }
    }

    .crosshair {
      position: absolute;
      width: 46px;
      height: 46px;
      border: 1px solid rgba(255,255,255,.62);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%);
      z-index: 10;
      transition: opacity .12s ease;
      box-shadow: 0 0 14px rgba(72,191,227,.18);
    }

    .crosshair::before,
    .crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,.75);
    }

    .crosshair::before {
      width: 58px;
      height: 1px;
      left: -7px;
      top: 22px;
    }

    .crosshair::after {
      width: 1px;
      height: 58px;
      top: -7px;
      left: 22px;
    }

    .playfield:hover .crosshair {
      opacity: .9;
    }

    .control-button {
      transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
      box-shadow: 0 5px 0 rgba(0,0,0,.18), 0 10px 22px rgba(0,0,0,.18);
    }

    .control-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    .control-button:focus-visible {
      outline: 3px solid rgba(86,227,159,.8);
      outline-offset: 3px;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      background: rgba(4,10,17,.74);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .overlay-panel {
      width: min(420px, 100%);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 20px 55px rgba(0,0,0,.4);
      animation: overlayIn .28s ease-out both;
      transform-style: preserve-3d;
    }

    @keyframes overlayIn {
      from { opacity: 0; transform: translateY(16px) scale(.97) rotateX(5deg); }
      to { opacity: 1; transform: translateY(0) scale(1) rotateX(0); }
    }

    .hidden { display: none !important; }

    @media (max-width: 760px) {
      .game-frame { padding: 20px 14px 20px; }
      .playfield { height: 390px; }
      .target { width: 60px; height: 60px; }
      .target::after { inset: 17px; }
      .target-shadow { width: 58px; }
    }

    @media (max-width: 520px) {
      .playfield { height: 350px; }
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
 </head>
 <body data-template-id="__page-root">

  <script src="/_sdk/editing_sdk.js"></script>
  <script>
    const playfield = document.getElementById('playfield');
    const crosshair = document.getElementById('crosshair');
    const scoreValue = document.getElementById('scoreValue');
    const timeValue = document.getElementById('timeValue');
    const comboValue = document.getElementById('comboValue');
    const finalScore = document.getElementById('finalScore');
    const overlay = document.getElementById('gameOverlay');
    const startPanel = overlay.querySelector('[data-template-id="start-panel"]');
    const endPanel = document.getElementById('endPanel');
    const startButton = document.getElementById('startButton');
    const restartButton = document.getElementById('restartButton');
    const overlayStartButton = document.getElementById('overlayStartButton');
    const playAgainButton = document.getElementById('playAgainButton');
    const soundButton = document.getElementById('soundButton');
    const soundIcon = document.getElementById('soundIcon');

    let score = 0;
    let timeLeft = 45;
    let combo = 0;
    let running = false;
    let timerId = null;
    let animationId = null;
    let targets = [];
    let lastTime = 0;
    let soundOn = true;
    let audioCtx = null;

    const TARGET_COUNT = 5;

    function formatScore(value) {
      return String(value).padStart(4, '0');
    }

    function updateStats() {
      scoreValue.textContent = formatScore(score);
      timeValue.textContent = String(timeLeft).padStart(2, '0');
      comboValue.textContent = `x${combo}`;
    }

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playTone(type) {
      if (!soundOn) return;
      ensureAudio();

      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = type === 'hit' ? 'triangle' : 'sine';
      osc.frequency.setValueAtTime(type === 'hit' ? 520 : 160, now);
      osc.frequency.exponentialRampToValueAtTime(type === 'hit' ? 840 : 110, now + 0.08);
      gain.gain.setValueAtTime(type === 'hit' ? 0.07 : 0.035, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);

      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.13);
    }

    function getProjectedPosition(item, rect) {
      const depthScale = 0.58 + item.z * 0.72;
      const horizonY = rect.height * 0.2;
      const floorY = rect.height * 0.82;
      const projectedY = horizonY + (floorY - horizonY) * item.z + item.yOffset;
      const spread = rect.width * (0.22 + item.z * 0.42);
      const projectedX = rect.width / 2 + item.xNorm * spread;
      return { x: projectedX, y: projectedY, scale: depthScale };
    }

    function createTarget() {
      const target = document.createElement('button');
      target.className = 'target';
      target.type = 'button';
      target.setAttribute('aria-label', 'Shoot target');

      const shadow = document.createElement('div');
      shadow.className = 'target-shadow';

      const item = {
        el: target,
        shadow,
        xNorm: (Math.random() * 1.7) - 0.85,
        z: 0.18 + Math.random() * 0.72,
        vx: (Math.random() > 0.5 ? 1 : -1) * (0.16 + Math.random() * 0.14),
        vz: (Math.random() > 0.5 ? 1 : -1) * (0.06 + Math.random() * 0.06),
        yOffset: -25 - Math.random() * 90,
        bob: Math.random() * Math.PI * 2
      };

      target.addEventListener('click', (event) => {
        event.stopPropagation();
        if (!running) return;
        handleHit(item, event);
      });

      playfield.appendChild(shadow);
      playfield.appendChild(target);
      targets.push(item);
      updateTargetVisual(item);
    }

    function updateTargetVisual(item) {
      const rect = playfield.getBoundingClientRect();
      const pos = getProjectedPosition(item, rect);

      item.el.style.left = `${pos.x - 37}px`;
      item.el.style.top = `${pos.y - 37}px`;
      item.el.style.transform = `scale(${pos.scale})`;
      item.el.style.zIndex = String(5 + Math.round(item.z * 10));

      item.shadow.style.left = `${pos.x - 36 * pos.scale}px`;
      item.shadow.style.top = `${pos.y + 24 * pos.scale}px`;

      item.shadow.style.zIndex = String(2 + Math.round(item.z * 6));

    function handleHit(item, event) {

      const bonus = combo >= 5 ? 5 : 0;
      const gained = 10 + bonus;
      score += gained;
      updateStats();
      playTone('hit');

      const rect = playfield.getBoundingClientRect();
      const float = document.createElement('div');
      float.className = 'float-score';
      float.textContent = `+${gained}`;
      float.style.left = `${event.clientX - rect.left - 10}px`;
      float.style.top = `${event.clientY - rect.top - 16}px`;
      playfield.appendChild(float);

      item.el.classList.add('hit');

      setTimeout(() => {

        item.el.classList.remove('hit');
        item.xNorm = (Math.random() * 1.7) - 0.85;
        item.z = 0.18 + Math.random() * 0.72;
        item.vx = (Math.random() > 0.5 ? 1 : -1) * (0.16 + Math.random() * 0.14);
        item.vz = (Math.random() > 0.5 ? 1 : -1) * (0.06 + Math.random() * 0.06);

        item.z += item.vz * delta;
        item.bob += delta * 2.2;

        if (item.xNorm <= -0.95 || item.xNorm >= 0.95) {

    function clearTargets() {

        item.el.remove();
        item.shadow.remove();
      });
      targets = [];
    }

    function startGame() {

      score = 0;
      timeLeft = 45;
      combo = 0;
      running = true;
      lastTime = 0;

      updateStats();
      clearTargets();

      overlay.classList.add('hidden');
      startPanel.classList.remove('hidden');
      endPanel.classList.add('hidden');
      startButton.classList.add('hidden');
      restartButton.classList.remove('hidden');

      for (let i = 0; i < TARGET_COUNT; i++) createTarget();

      clearInterval(timerId);
      timerId = setInterval(() => {
        timeLeft -= 1;
        updateStats();
        if (timeLeft <= 0) endGame();
      }, 1000);

      cancelAnimationFrame(animationId);
      animationId = requestAnimationFrame(moveTargets);
    }

    function endGame() {

      clearInterval(timerId);
      cancelAnimationFrame(animationId);
      finalScore.textContent = formatScore(score);

      overlay.classList.remove('hidden');
      startPanel.classList.add('hidden');
      endPanel.classList.remove('hidden');
      restartButton.classList.add('hidden');
      startButton.classList.remove('hidden');

      targets.forEach(item => {
        item.el.disabled = true;
        item.el.style.opacity = '.45';
        item.shadow.style.opacity = '.08';
      });
    }

    playfield.addEventListener('mousemove', (event) => {
      const rect = playfield.getBoundingClientRect();
      crosshair.style.left = `${event.clientX - rect.left}px`;
      crosshair.style.top = `${event.clientY - rect.top}px`;
    });

    playfield.addEventListener('click', () => {
      if (!running) return;
      combo = 0;
      updateStats();
      playTone('miss');
    });

    startButton.addEventListener('click', startGame);
    restartButton.addEventListener('click', startGame);
    overlayStartButton.addEventListener('click', startGame);
    playAgainButton.addEventListener('click', startGame);

    soundButton.addEventListener('click', () => {
      soundOn = !soundOn;
      soundButton.setAttribute('aria-pressed', String(soundOn));
      soundIcon.setAttribute('data-lucide', soundOn ? 'volume-2' : 'volume-x');
      lucide.createIcons();
    });

    window.addEventListener('resize', () => {
      targets.forEach(updateTargetVisual);
